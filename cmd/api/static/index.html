<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes — System Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Departure+Mono&family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0e0b;
      --bg-raised:  #131310;
      --bg-line:    #1e1e1a;
      --border:     #2a2a25;
      --border-mid: #3a3a33;
      --text-dim:   #4a4a42;
      --text-mid:   #7a7a6e;
      --text:       #c8c8b8;
      --text-bright:#eeeee0;
      --amber:      #d4891a;
      --amber-dim:  #7a4f0e;
      --amber-glow: rgba(212,137,26,0.12);
      --green:      #4a8c5c;
      --green-dim:  #2a4f35;
      --red:        #8c3a3a;
      --red-bright: #c45050;
      --mono:       'Departure Mono', monospace;
      --serif:      'Cormorant', serif;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    /* ─── Scan-line texture overlay ────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* ─── Layout ────────────────────────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ─── Header ────────────────────────────────────────────────────────────── */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      padding: 2.5rem 0 0;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      gap: 2rem;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .wordmark {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--text-bright);
      line-height: 1;
    }

    .wordmark em {
      font-style: italic;
      color: var(--amber);
    }

    .system-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-mid);
      border: 1px solid var(--border);
      padding: 0.35rem 0.75rem;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    .clock {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.5rem;
    }

    .submit-btn {
      background: none;
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .submit-btn:hover {
      background: var(--amber-glow);
      border-color: var(--amber);
    }

    /* ─── Main grid ─────────────────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto 1fr;
      gap: 0;
      padding: 2rem 0 3rem;
      column-gap: 0;
      row-gap: 0;
    }

    /* ─── Stat strip ─────────────────────────────────────────────────────────── */
    .stat-strip {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
      border-bottom: none;
      margin-bottom: 0;
    }

    .stat-cell {
      padding: 1.5rem 1.75rem;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .stat-cell:last-child { border-right: none; }

    .stat-cell::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }

    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }

    .stat-value {
      font-family: var(--serif);
      font-size: 3rem;
      font-weight: 300;
      line-height: 1;
      color: var(--text-bright);
      transition: color 0.4s;
    }

    .stat-value.amber { color: var(--amber); }
    .stat-value.dim   { color: var(--text-mid); }

    .stat-sub {
      font-size: 0.6rem;
      color: var(--text-dim);
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
    }

    /* ─── Section headings ──────────────────────────────────────────────────── */
    .section-head {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 1rem 1.75rem 0.75rem;
      border: 1px solid var(--border);
      border-top: 2px solid var(--amber-dim);
      background: var(--bg-raised);
    }

    /* ─── Workers panel ─────────────────────────────────────────────────────── */
    .workers-panel {
      grid-column: 1 / 3;
      border: 1px solid var(--border);
      border-top: none;
      border-right: none;
    }

    .workers-head {
      border-top: 2px solid var(--amber-dim);
    }

    .workers-list {
      padding: 0.5rem 0;
    }

    .worker-row {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 1.5rem;
      padding: 0.9rem 1.75rem;
      border-bottom: 1px solid var(--bg-line);
      transition: background 0.15s;
      animation: rowIn 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .worker-row:hover { background: var(--bg-raised); }
    .worker-row:last-child { border-bottom: none; }

    .worker-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .worker-indicator.idle { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .worker-indicator.busy { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
    .worker-indicator.dead { background: var(--text-dim); }

    .worker-id {
      font-size: 0.72rem;
      color: var(--text);
      letter-spacing: 0.04em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .worker-id span {
      color: var(--text-dim);
      font-size: 0.65rem;
    }

    .worker-load {
      font-size: 0.65rem;
      color: var(--text-mid);
      text-align: right;
      white-space: nowrap;
    }

    .load-bar-wrap {
      width: 80px;
      height: 2px;
      background: var(--border);
    }

    .load-bar {
      height: 100%;
      background: var(--amber);
      transition: width 0.6s ease;
    }

    .worker-seen {
      font-size: 0.6rem;
      color: var(--text-dim);
      text-align: right;
      white-space: nowrap;
    }

    .no-workers {
      padding: 3rem 1.75rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      border-bottom: 1px solid var(--bg-line);
    }

    /* ─── Activity log ──────────────────────────────────────────────────────── */
    .log-panel {
      grid-column: 3 / 4;
      border: 1px solid var(--border);
      border-top: none;
      display: flex;
      flex-direction: column;
    }

    .log-head {
      border-top: 2px solid var(--border-mid);
    }

    .log-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
      max-height: 420px;
    }

    .log-body::-webkit-scrollbar { width: 3px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); }

    .log-entry {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.75rem;
      padding: 0.6rem 1.5rem;
      border-bottom: 1px solid var(--bg-line);
      animation: logIn 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes logIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .log-time {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      white-space: nowrap;
      padding-top: 1px;
    }

    .log-msg {
      font-size: 0.68rem;
      color: var(--text-mid);
      line-height: 1.5;
      word-break: break-all;
    }

    .log-msg.direct { color: var(--amber); }
    .log-msg.queued { color: var(--text); }
    .log-msg.error  { color: var(--red-bright); }
    .log-msg.info   { color: var(--text-mid); }

    /* ─── Submit job modal ──────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(14,14,11,0.88);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-top: 2px solid var(--amber);
      width: 480px;
      padding: 2rem;
      transform: translateY(12px);
      transition: transform 0.25s;
    }

    .modal-backdrop.open .modal { transform: translateY(0); }

    .modal-title {
      font-family: var(--serif);
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--text-bright);
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.6rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--amber-dim);
    }

    .field select option { background: var(--bg-raised); }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-mid);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-cancel:hover { border-color: var(--border-mid); color: var(--text); }

    .btn-submit {
      background: var(--amber-glow);
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-submit:hover {
      background: rgba(212,137,26,0.2);
      border-color: var(--amber);
    }

    /* ─── Footer ────────────────────────────────────────────────────────────── */
    footer {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding: 1rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .footer-left {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.15em;
    }

    .footer-right {
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    /* ─── Refresh indicator ─────────────────────────────────────────────────── */
    .refresh-bar {
      position: fixed;
      top: 0; left: 0;
      height: 1px;
      background: var(--amber);
      width: 0%;
      transition: width 0.1s linear;
      z-index: 999;
    }

    /* ─── Toast ─────────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-left: 2px solid var(--amber);
      padding: 0.75rem 1.25rem;
      font-size: 0.68rem;
      color: var(--text);
      letter-spacing: 0.05em;
      z-index: 600;
      transform: translateY(8px);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      max-width: 320px;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { border-left-color: var(--red-bright); }
  </style>
</head>
<body>

<div class="refresh-bar" id="refreshBar"></div>

<div class="shell">
  <header>
    <div class="header-left">
      <div class="wordmark">Her<em>mes</em></div>
      <div class="system-label">Distributed Job Processing System</div>
    </div>

    <div class="header-center">
      <div class="status-pill">
        <div class="pulse-dot" id="systemDot"></div>
        <span id="systemStatus">Connecting</span>
      </div>
      <div class="clock" id="clock">—</div>
    </div>

    <div class="header-right">
      <button class="submit-btn" onclick="openModal()">+ Submit Job</button>
    </div>
  </header>

  <main>
    <!-- Stat strip -->
    <div class="stat-strip">
      <div class="stat-cell">
        <div class="stat-label">Active Workers</div>
        <div class="stat-value" id="statWorkers">—</div>
        <div class="stat-sub">nodes registered</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Idle</div>
        <div class="stat-value" id="statIdle">—</div>
        <div class="stat-sub">awaiting work</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Busy</div>
        <div class="stat-value amber" id="statBusy">—</div>
        <div class="stat-sub">processing jobs</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Jobs Submitted</div>
        <div class="stat-value dim" id="statJobs">0</div>
        <div class="stat-sub">this session</div>
      </div>
    </div>

    <!-- Workers panel -->
    <div class="workers-panel">
      <div class="section-head workers-head">Worker Fleet</div>
      <div class="workers-list" id="workersList">
        <div class="no-workers">Polling for workers…</div>
      </div>
    </div>

    <!-- Activity log -->
    <div class="log-panel">
      <div class="section-head log-head">Activity Log</div>
      <div class="log-body" id="logBody"></div>
    </div>
  </main>

  <footer>
    <div class="footer-left">Hermes v1.0 — Philip Machar</div>
    <div class="footer-right" id="lastPoll">Last poll: —</div>
  </footer>
</div>

<!-- Submit job modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-title">Submit <em>Job</em></div>

    <div class="field">
      <label>Job Type</label>
      <select id="jobType">
        <option value="email">email</option>
        <option value="resize-image">resize-image</option>
      </select>
    </div>

    <div class="field">
      <label>Payload (JSON)</label>
      <textarea id="jobPayload" rows="5" placeholder='{"to":"user@example.com","subject":"Hello"}'></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitJob()">Dispatch</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── State ──────────────────────────────────────────────────────────────────
  let sessionJobs = 0;
  let pollInterval = null;
  const LOG_MAX = 60;

  // ─── Clock ──────────────────────────────────────────────────────────────────
  function tickClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toUTCString().replace('GMT', 'UTC');
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ─── Refresh bar animation ───────────────────────────────────────────────────
  const POLL_MS = 4000;
  let barStart = null;

  function animateBar(ts) {
    if (!barStart) barStart = ts;
    const pct = Math.min(((ts - barStart) / POLL_MS) * 100, 100);
    document.getElementById('refreshBar').style.width = pct + '%';
    if (pct < 100) requestAnimationFrame(animateBar);
    else {
      document.getElementById('refreshBar').style.width = '0%';
    }
  }

  // ─── Poll /workers ───────────────────────────────────────────────────────────
  async function pollWorkers() {
    barStart = null;
    requestAnimationFrame(animateBar);

    try {
      const res = await fetch('/workers');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      renderWorkers(data);
      updateSystemStatus(data.count > 0);
      document.getElementById('lastPoll').textContent =
        'Last poll: ' + new Date().toLocaleTimeString();
    } catch (e) {
      updateSystemStatus(false);
      log('Poll failed: ' + e.message, 'error');
    }
  }

  function renderWorkers(data) {
    const workers = data.workers || [];
    const idle = workers.filter(w => w.status === 'idle').length;
    const busy = workers.filter(w => w.status === 'busy').length;

    document.getElementById('statWorkers').textContent = data.count ?? 0;
    document.getElementById('statIdle').textContent    = idle;
    document.getElementById('statBusy').textContent    = busy;

    const list = document.getElementById('workersList');

    if (workers.length === 0) {
      list.innerHTML = '<div class="no-workers">No workers registered.</div>';
      return;
    }

    list.innerHTML = workers.map((w, i) => {
      const loadPct = Math.min(w.load * 20, 100);
      const ago     = timeSince(w.last_seen_unix);
      const idStr   = w.worker_id.length > 24
        ? w.worker_id.slice(0, 8) + '…' + w.worker_id.slice(-8)
        : w.worker_id;

      return `
        <div class="worker-row" style="animation-delay:${i * 0.05}s">
          <div class="worker-indicator ${w.status}"></div>
          <div class="worker-id">${idStr} <span>${w.status}</span></div>
          <div class="worker-load">
            <div style="margin-bottom:4px">load&nbsp;${w.load}</div>
            <div class="load-bar-wrap">
              <div class="load-bar" style="width:${loadPct}%"></div>
            </div>
          </div>
          <div class="worker-seen">${ago}</div>
        </div>
      `;
    }).join('');
  }

  function updateSystemStatus(online) {
    const dot  = document.getElementById('systemDot');
    const text = document.getElementById('systemStatus');
    if (online) {
      dot.style.background  = 'var(--green)';
      text.textContent      = 'Operational';
    } else {
      dot.style.background  = 'var(--amber)';
      text.textContent      = 'No workers';
    }
  }

  // ─── Activity log ────────────────────────────────────────────────────────────
  function log(msg, type = 'info') {
    const body   = document.getElementById('logBody');
    const time   = new Date().toLocaleTimeString('en-GB', { hour12: false });
    const entry  = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<div class="log-time">${time}</div><div class="log-msg ${type}">${msg}</div>`;

    body.prepend(entry);

    // Trim to max entries
    while (body.children.length > LOG_MAX) {
      body.removeChild(body.lastChild);
    }
  }

  // ─── Submit job ──────────────────────────────────────────────────────────────
  function openModal() {
    document.getElementById('modalBackdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
  }

  document.getElementById('modalBackdrop').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  async function submitJob() {
    const type    = document.getElementById('jobType').value;
    const rawPay  = document.getElementById('jobPayload').value.trim();

    let payload;
    try {
      payload = rawPay ? JSON.parse(rawPay) : {};
    } catch {
      showToast('Invalid JSON payload', true);
      return;
    }

    try {
      const res = await fetch('/jobs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, payload }),
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      sessionJobs++;
      document.getElementById('statJobs').textContent = sessionJobs;

      const routed = data.routed === 'direct'
        ? `→ ${data.worker_id?.slice(0, 8)}… (direct)`
        : '→ queue (no workers)';

      log(`job:${data.job?.id?.slice(0, 8)}… type=${type} ${routed}`,
          data.routed === 'direct' ? 'direct' : 'queued');

      showToast(`Job dispatched — ${data.routed}`);
      closeModal();
      pollWorkers();
    } catch (e) {
      showToast('Dispatch failed: ' + e.message, true);
      log('Dispatch error: ' + e.message, 'error');
    }
  }

  // ─── Toast ───────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast show' + (error ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3200);
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function timeSince(unixSec) {
    const diff = Math.floor(Date.now() / 1000) - unixSec;
    if (diff < 5)  return 'just now';
    if (diff < 60) return diff + 's ago';
    return Math.floor(diff / 60) + 'm ago';
  }

  // ─── Init ────────────────────────────────────────────────────────────────────
  pollWorkers();
  log('Dashboard initialised', 'info');
  pollInterval = setInterval(pollWorkers, POLL_MS);
</script>
</body>
</html>
