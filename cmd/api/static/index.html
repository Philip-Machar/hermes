<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes — System Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Departure+Mono&family=Cormorant:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0e0e0b;
      --bg-raised:  #131310;
      --bg-line:    #1a1a17;
      --border:     #272722;
      --border-mid: #3a3a33;
      --text-dim:   #44443c;
      --text-mid:   #78786e;
      --text:       #c8c8b8;
      --text-bright:#eeeee0;
      --amber:      #d4891a;
      --amber-dim:  #6e450a;
      --amber-glow: rgba(212,137,26,0.10);
      --green:      #4a8c5c;
      --red-bright: #c45050;
      --mono:       'Departure Mono', monospace;
      --serif:      'Cormorant', serif;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scan-line texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* ── Layout ── */
    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
      gap: 2rem;
    }

    .header-left { display: flex; flex-direction: column; gap: 0.25rem; }

    .wordmark {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--text-bright);
      line-height: 1;
    }
    .wordmark em { font-style: italic; color: var(--amber); }

    .system-label {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .header-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-mid);
      border: 1px solid var(--border);
      padding: 0.35rem 0.85rem;
    }

    .pulse-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.35; transform:scale(0.65); }
    }

    .clock { font-size: 0.65rem; color: var(--text-dim); letter-spacing: 0.08em; }

    .header-right {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
    }

    .submit-btn {
      background: none;
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.5rem 1.25rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .submit-btn:hover { background: var(--amber-glow); border-color: var(--amber); }

    /* ── Stat strip ── */
    .stat-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
      border-top: none;
    }

    .stat-cell {
      padding: 1.5rem 1.75rem;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: none; }

    .stat-label {
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.6rem;
    }

    .stat-value {
      font-family: var(--serif);
      font-size: 3.2rem;
      font-weight: 300;
      line-height: 1;
      color: var(--text-bright);
      transition: color 0.3s;
    }
    .stat-value.amber { color: var(--amber); }
    .stat-value.dim   { color: var(--text-mid); }

    .stat-sub {
      font-size: 0.58rem;
      color: var(--text-dim);
      margin-top: 0.45rem;
      letter-spacing: 0.08em;
    }

    /* ── Main content ── */
    .content {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      flex: 1;
    }

    /* ── Section head ── */
    .section-head {
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0.85rem 1.75rem;
      border-bottom: 1px solid var(--border);
      border-top: 2px solid var(--amber-dim);
      background: var(--bg-raised);
    }

    .section-head.plain { border-top-color: var(--border); }

    /* ── Workers ── */
    .workers-panel {
      grid-column: 1 / 3;
      border: 1px solid var(--border);
      border-top: none;
      border-right: none;
    }

    .worker-row {
      display: grid;
      grid-template-columns: 10px 1fr auto 90px auto;
      align-items: center;
      gap: 1.25rem;
      padding: 0.9rem 1.75rem;
      border-bottom: 1px solid var(--bg-line);
      transition: background 0.15s;
      animation: rowIn 0.35s ease both;
      opacity: 0;
    }
    @keyframes rowIn {
      from { opacity:0; transform:translateX(-6px); }
      to   { opacity:1; transform:translateX(0); }
    }
    .worker-row:hover { background: var(--bg-raised); }
    .worker-row:last-child { border-bottom: none; }

    .w-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .w-dot.idle { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .w-dot.busy { background: var(--amber); box-shadow: 0 0 5px var(--amber); animation: pulse 1.2s ease-in-out infinite; }

    .w-id {
      font-size: 0.7rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .w-id span { color: var(--text-dim); font-size: 0.62rem; margin-left: 0.4rem; }

    .w-status {
      font-size: 0.6rem;
      color: var(--text-mid);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .w-bar-wrap { width: 90px; height: 2px; background: var(--border); }
    .w-bar { height: 100%; background: var(--amber); transition: width 0.5s ease; }

    .w-seen {
      font-size: 0.6rem;
      color: var(--text-dim);
      white-space: nowrap;
      text-align: right;
    }

    .empty-state {
      padding: 3rem 1.75rem;
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    /* ── Log ── */
    .log-panel {
      grid-column: 3 / 4;
      border: 1px solid var(--border);
      border-top: none;
      display: flex;
      flex-direction: column;
    }

    .log-body {
      flex: 1;
      overflow-y: auto;
      max-height: 480px;
    }
    .log-body::-webkit-scrollbar { width: 2px; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); }

    .log-entry {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 0.75rem;
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid var(--bg-line);
      animation: logIn 0.25s ease both;
    }
    @keyframes logIn {
      from { opacity:0; transform:translateY(-3px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .log-time {
      font-size: 0.58rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      padding-top: 2px;
      white-space: nowrap;
    }

    .log-content { display: flex; flex-direction: column; gap: 0.15rem; }

    .log-type {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .log-type.direct { color: var(--amber); }
    .log-type.queued { color: var(--text); }
    .log-type.error  { color: var(--red-bright); }
    .log-type.info   { color: var(--text-dim); }

    .log-detail {
      font-size: 0.62rem;
      color: var(--text-mid);
      word-break: break-all;
      line-height: 1.4;
    }

    /* ── Modal ── */
    .backdrop {
      position: fixed; inset: 0;
      background: rgba(14,14,11,0.85);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .backdrop.open { opacity:1; pointer-events:all; }

    .modal {
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-top: 2px solid var(--amber);
      width: 460px;
      padding: 2rem;
      transform: translateY(10px);
      transition: transform 0.22s;
    }
    .backdrop.open .modal { transform: translateY(0); }

    .modal-title {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--text-bright);
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
    }
    .modal-title em { font-style: italic; color: var(--amber); }

    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.35rem;
    }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--amber-dim); }
    .field select option { background: var(--bg-raised); }

    .modal-actions {
      display: flex; gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .btn {
      background: none;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.1rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-cancel { border: 1px solid var(--border); color: var(--text-mid); }
    .btn-cancel:hover { border-color: var(--border-mid); color: var(--text); }
    .btn-submit {
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      background: var(--amber-glow);
    }
    .btn-submit:hover { background: rgba(212,137,26,0.18); border-color: var(--amber); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }
    .footer-txt { font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.12em; }

    /* ── Refresh bar ── */
    #refreshBar {
      position: fixed;
      top: 0; left: 0;
      height: 1px;
      background: var(--amber);
      width: 0%;
      z-index: 999;
      transition: width 0.08s linear;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-left: 2px solid var(--amber);
      padding: 0.7rem 1.1rem;
      font-size: 0.65rem;
      color: var(--text);
      z-index: 600;
      transform: translateY(6px);
      opacity: 0;
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      max-width: 300px;
    }
    .toast.show { opacity:1; transform:translateY(0); }
    .toast.err  { border-left-color: var(--red-bright); }
  </style>
</head>
<body>

<div id="refreshBar"></div>

<div class="shell">
  <header>
    <div class="header-left">
      <div class="wordmark">Her<em>mes</em></div>
      <div class="system-label">Distributed Job Processing System</div>
    </div>
    <div class="header-center">
      <div class="status-pill">
        <div class="pulse-dot" id="sysDot"></div>
        <span id="sysStatus">Connecting</span>
      </div>
      <div class="clock" id="clock">—</div>
    </div>
    <div class="header-right">
      <button class="submit-btn" onclick="openModal()">+ Submit Job</button>
    </div>
  </header>

  <div class="stat-strip">
    <div class="stat-cell">
      <div class="stat-label">Active Workers</div>
      <div class="stat-value" id="sWorkers">—</div>
      <div class="stat-sub">nodes registered</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Idle</div>
      <div class="stat-value" id="sIdle">—</div>
      <div class="stat-sub">awaiting work</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Busy</div>
      <div class="stat-value amber" id="sBusy">—</div>
      <div class="stat-sub">processing</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Jobs This Session</div>
      <div class="stat-value dim" id="sJobs">0</div>
      <div class="stat-sub">submitted via dashboard</div>
    </div>
  </div>

  <div class="content">
    <div class="workers-panel">
      <div class="section-head">Worker Fleet</div>
      <div id="workersList"><div class="empty-state">Polling for workers…</div></div>
    </div>

    <div class="log-panel">
      <div class="section-head plain">Activity Log</div>
      <div class="log-body" id="logBody">
        <div class="empty-state">Waiting for events…</div>
      </div>
    </div>
  </div>

  <footer>
    <div class="footer-txt">Hermes v1.0 — Philip Machar</div>
    <div class="footer-txt" id="lastPoll">Last poll: —</div>
  </footer>
</div>

<!-- Modal -->
<div class="backdrop" id="backdrop">
  <div class="modal">
    <div class="modal-title">Submit <em>Job</em></div>
    <div class="field">
      <label>Job Type</label>
      <select id="jobType">
        <option value="email">email</option>
        <option value="resize-image">resize-image</option>
      </select>
    </div>
    <div class="field">
      <label>Payload (JSON)</label>
      <textarea id="jobPayload" rows="5" placeholder='{"to":"user@example.com","subject":"Hello"}'></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-submit" onclick="submitJob()">Dispatch</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Constants ──────────────────────────────────────────────────────────────
  const POLL_MS   = 3000;
  const LOG_MAX   = 80;

  // ── State ──────────────────────────────────────────────────────────────────
  let sessionJobs    = 0;
  let seenEventIDs   = new Set();   // deduplicate events from /events endpoint
  let barStart       = null;

  // ── Clock ──────────────────────────────────────────────────────────────────
  function tickClock() {
    document.getElementById('clock').textContent =
      new Date().toUTCString().replace('GMT','UTC');
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ── Refresh bar ────────────────────────────────────────────────────────────
  function animateBar(ts) {
    if (!barStart) barStart = ts;
    const pct = Math.min(((ts - barStart) / POLL_MS) * 100, 100);
    document.getElementById('refreshBar').style.width = pct + '%';
    if (pct < 100) requestAnimationFrame(animateBar);
    else document.getElementById('refreshBar').style.width = '0%';
  }

  // ── Poll /workers ──────────────────────────────────────────────────────────
  async function pollWorkers() {
    try {
      const res  = await fetch('/workers');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      renderWorkers(data);
      setStatus(data.count > 0);
    } catch(e) {
      setStatus(false);
    }
  }

  function renderWorkers(data) {
    const workers = data.workers || [];
    const idle    = workers.filter(w => w.status === 'idle').length;
    const busy    = workers.filter(w => w.status === 'busy').length;

    document.getElementById('sWorkers').textContent = data.count ?? 0;
    document.getElementById('sIdle').textContent    = idle;
    document.getElementById('sBusy').textContent    = busy;

    const list = document.getElementById('workersList');
    if (!workers.length) {
      list.innerHTML = '<div class="empty-state">No workers registered.</div>';
      return;
    }

    list.innerHTML = workers.map((w, i) => {
      const loadPct = Math.min(w.load * 20, 100);
      const short   = w.worker_id.length > 20
        ? w.worker_id.slice(0,8) + '…' + w.worker_id.slice(-6)
        : w.worker_id;
      return `
        <div class="worker-row" style="animation-delay:${i*0.04}s">
          <div class="w-dot ${w.status}"></div>
          <div class="w-id">${short}<span>${w.status}</span></div>
          <div class="w-status">${w.status}</div>
          <div class="w-bar-wrap"><div class="w-bar" style="width:${loadPct}%"></div></div>
          <div class="w-seen">${timeSince(w.last_seen_unix)}</div>
        </div>`;
    }).join('');
  }

  function setStatus(online) {
    const dot  = document.getElementById('sysDot');
    const txt  = document.getElementById('sysStatus');
    dot.style.background = online ? 'var(--green)' : 'var(--amber)';
    txt.textContent      = online ? 'Operational' : 'No workers';
  }

  // ── Poll /events ───────────────────────────────────────────────────────────
  async function pollEvents() {
    try {
      const res  = await fetch('/events');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      renderEvents(data.events || []);
      document.getElementById('lastPoll').textContent =
        'Last poll: ' + new Date().toLocaleTimeString();
    } catch(e) { /* silent */ }
  }

  function renderEvents(evts) {
    const body = document.getElementById('logBody');
    let hasNew = false;

    // evts arrive newest-first from the server; process in that order
    // so we prepend them in order.
    for (const e of evts) {
      // Use time+jobID as a stable dedup key.
      const key = e.time + '|' + e.job_id;
      if (seenEventIDs.has(key)) continue;
      seenEventIDs.add(key);
      hasNew = true;

      const t    = new Date(e.time);
      const hms  = t.toLocaleTimeString('en-GB', { hour12: false });
      const div  = document.createElement('div');
      div.className = 'log-entry';
      div.innerHTML = `
        <div class="log-time">${hms}</div>
        <div class="log-content">
          <div class="log-type ${e.kind}">${e.kind}</div>
          <div class="log-detail">${e.job_type} · ${e.job_id.slice(0,8)}… · ${e.message}</div>
        </div>`;

      // Remove placeholder if present.
      const placeholder = body.querySelector('.empty-state');
      if (placeholder) placeholder.remove();

      body.prepend(div);
    }

    // Trim to max.
    while (body.children.length > LOG_MAX) body.removeChild(body.lastChild);

    // Keep seenEventIDs from growing unbounded.
    if (seenEventIDs.size > 500) seenEventIDs.clear();
  }

  // ── Combined poll ──────────────────────────────────────────────────────────
  async function poll() {
    barStart = null;
    requestAnimationFrame(animateBar);
    await Promise.all([pollWorkers(), pollEvents()]);
  }

  // ── Submit job ─────────────────────────────────────────────────────────────
  function openModal()  { document.getElementById('backdrop').classList.add('open'); }
  function closeModal() { document.getElementById('backdrop').classList.remove('open'); }

  document.getElementById('backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('backdrop')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  async function submitJob() {
    const type   = document.getElementById('jobType').value;
    const rawPay = document.getElementById('jobPayload').value.trim();
    let payload;
    try { payload = rawPay ? JSON.parse(rawPay) : {}; }
    catch { showToast('Invalid JSON payload', true); return; }

    try {
      const res = await fetch('/jobs', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, payload }),
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      sessionJobs++;
      document.getElementById('sJobs').textContent = sessionJobs;

      showToast('Job dispatched — ' + data.routed);
      closeModal();
      // Immediate poll so the new event appears right away.
      setTimeout(poll, 200);
    } catch(e) {
      showToast('Dispatch failed: ' + e.message, true);
    }
  }

  // ── Toast ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, err = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast show' + (err ? ' err' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function timeSince(unix) {
    const d = Math.floor(Date.now()/1000) - unix;
    if (d < 5)  return 'just now';
    if (d < 60) return d + 's ago';
    return Math.floor(d/60) + 'm ago';
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
